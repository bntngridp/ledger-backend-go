services:
  ledger-backend-db:
    image: postgres:16-alpine
    container_name: ledger-backend-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ledger-db
    ports:
      - "7072:5432"
    volumes:
      - ledger-backend-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ledger-db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  ledger-backend-db-data:
